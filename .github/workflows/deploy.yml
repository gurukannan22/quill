name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Extension
        run: npm run build
      
      - name: Zip Extension
        run: |
          cd dist
          zip -r ../quill-extension.zip .
          cd ..
          
      - name: Prepare Pages Directory
        run: |
          mkdir -p gh-pages-site
          cp quill-extension.zip gh-pages-site/
          # Copy the template index.html to the site directory
          cp scripts/github-pages.html gh-pages-site/index.html
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'gh-pages-site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Extension
        run: npm run build
      
      - name: Zip Extension
        run: |
          cd dist
          zip -r ../quill-extension.zip .
          cd ..
          
      - name: Build CRX
        run: npx -y crx3 dist/ -o quill-extension.crx

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: Quill Extension v0.1.0
          files: |
            quill-extension.zip
            quill-extension.crx
          
      - name: Prepare Pages Directory
        run: |
          mkdir -p gh-pages-site
          cp quill-extension.zip gh-pages-site/
          cp quill-extension.crx gh-pages-site/
          # Copy the template index.html to the site directory
          cp scripts/github-pages.html gh-pages-site/index.html
          # Copy changelog and versions
          cp CHANGELOG.md gh-pages-site/ || true
          cp versions.txt gh-pages-site/ || true
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'gh-pages-site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
